        type: subscription
        metric: seat
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Developer Environments
        name: developer_environments
        type: quota
        metric: environment
        limit: 3
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Cloud Flows
