specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Power Platform APIs
providerId: power-platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Business Applications
  - Copilot Studio
  - Dataverse
  - Low-Code
  - Microsoft
  - Power Apps
  - Power Automate
description: >-
  Microsoft Power Platform is sold as a portfolio of per-user, per-flow,
  per-bot, and per-tenant plans across Power Apps, Power Automate, Copilot
  Studio, and Dataverse. Per-user prices ($20 Power Apps Premium, $15 Power
  Automate Premium) come from the Microsoft pricing pages. Process-style
  licenses meter at the bot or flow level ($150 Process, $215 Hosted Process,
  $5,000 Process Mining tenant add-on). AI assistance is billed in Copilot
  Credits ($200 per 25,000 credits/month). Dataverse storage is billed per
  GB/month ($40). Each license also carries a Power Platform Requests entitlement.
sources:
  - https://www.microsoft.com/en-us/power-platform/products/power-apps/pricing
  - https://www.microsoft.com/en-us/power-platform/products/power-automate/pricing
  - https://learn.microsoft.com/en-us/power-platform/admin/api-request-limits-allocations
