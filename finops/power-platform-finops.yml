description: >-
  FOCUS-aligned FinOps for Microsoft Power Platform: layered model combining
  per-user subscriptions (Power Apps Premium $20, Power Automate Premium $15),
  per-bot subscriptions (Process $150, Hosted Process $215), tenant-level
  add-ons (Process Mining $5,000, Dataverse storage $40/GB/month), pre-paid
  Copilot Credits ($200 per 25,000), and pay-as-you-go overage for Power Apps.
  The unifying meter is Power Platform Requests (PPR), entitled per license
  on a 24-hour sliding window. Add-on capacity packs raise target identities
  by 50k PPR/day each and are stackable.
sources:
  - https://www.microsoft.com/en-us/power-platform/products/power-apps/pricing
  - https://www.microsoft.com/en-us/power-platform/products/power-automate/pricing
  - https://learn.microsoft.com/en-us/power-platform/admin/api-request-limits-allocations
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Corporation
serviceCategory: Business Applications
billingModel:
  pricingCategory: Subscription + Per-Bot + Pay-As-You-Go + Tenant Add-Ons
  billingFrequency: Annual (per-user/per-bot) and Monthly (PAYG and Copilot Credits)
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Microsoft Power Platform
  ServiceCategory: Business Applications
  ServiceSubcategory: Low-Code Platform
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingUnit: seat-month / bot-month / GB-month / 25k-credits
meters:
  - name: power_apps_premium_seats
    description: Per-user Power Apps Premium subscriptions.
    unit: seat-month
    aggregation: max
    dimensions:
      - tenant
      - department
  - name: power_automate_premium_seats
    description: Per-user Power Automate Premium subscriptions.
    unit: seat-month
    aggregation: max
    dimensions:
      - tenant
      - department
  - name: process_bots
    description: Per-bot Process and Hosted Process subscriptions for unattended desktop flows.
    unit: bot-month
    aggregation: max
    dimensions:
      - flow_id
      - environment
      - hosted
  - name: power_platform_requests
    description: Daily request entitlement consumed per user (Premium) or per flow (Process), evaluated on a 24-hour sliding window.
    unit: request
    aggregation: sum
    dimensions:
      - environment
      - caller_id
      - caller_type
      - resource_type
      - license
  - name: copilot_credits
    description: Microsoft Copilot Studio Credits consumed by custom copilots.
    unit: credit
    aggregation: sum
    dimensions:
      - copilot
      - tenant
      - environment
  - name: dataverse_storage
    description: Dataverse database, file, and log storage at the tenant level.
    unit: GB-month
    aggregation: max
    dimensions:
      - environment
      - storage_type
  - name: process_mining_storage
    description: Process Mining add-on storage capacity.
    unit: GB-month
    aggregation: max
    dimensions:
      - tenant
  - name: payg_actions
    description: Pay-as-you-go cloud-flow actions billed when daily PPR limits are exceeded.
    unit: action
    aggregation: sum
    dimensions:
      - environment
      - flow_id
principles:
  - name: Visibility
    description: Use the Power Platform admin center capacity reports (Licensed user, Non-licensed user, Per-flow) to track Power Platform Requests against entitlement; Microsoft 365 admin center surfaces seat consumption.
  - name: Allocation
    description: Tag environments by business unit and assign capacity reports per-environment; the per-flow report attributes Process-license consumption to a specific flow_id for chargeback to the flow's owning team.
  - name: Optimization
    description: Right-size license mix between Premium (per-user) and Process (per-flow); stack Process licenses on a single high-volume flow rather than over-licensing users; switch to Power Apps pay-as-you-go for spiky workloads to avoid throttling; cache and de-duplicate connector calls inside flows.
  - name: Accountability
    description: Environment admins are accountable for PPR consumption in their environments; Power Automate flow owners are accountable for the 24-hour and 5-minute (100k) ceilings; tenant admins purchase capacity add-ons and review per-flow reports before transition-period enforcement begins.
maintainers:
