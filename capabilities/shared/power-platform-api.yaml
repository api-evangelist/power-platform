naftiko: "1.0.0-alpha1"

info:
  label: "Microsoft Power Platform Unified API"
  description: "Unified REST API for Power Platform administrative capabilities including environment management, application packages, flow runs, and licensing."
  tags:
    - Microsoft
    - Power Platform
    - Administration
    - Low-Code
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      POWER_PLATFORM_BEARER_TOKEN: POWER_PLATFORM_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: power-platform-api
      baseUri: https://api.powerplatform.com
      description: "Unified RESTful API for Power Platform administrative capabilities."
      authentication:
        type: bearer
        token: "{{POWER_PLATFORM_BEARER_TOKEN}}"
      resources:
        - name: environments
          path: /providers/Microsoft.BusinessAppPlatform/scopes/admin
          description: "Power Platform environment management"
          operations:
            - name: list-environments
              method: GET
              description: "List all Power Platform environments for the tenant"
              inputParameters:
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-environment
              method: GET
              description: "Get details for a specific environment"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-environment
              method: DELETE
              description: "Delete a Power Platform environment"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: applications
          path: /appmanagement
          description: "Application package management"
          operations:
            - name: get-environment-application-packages
              method: GET
              description: "List application packages available in an environment"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: install-application-package
              method: POST
              description: "Install an application package in an environment"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: applicationPackageId
                  in: path
                  type: string
                  required: true
                  description: "Application package identifier"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-install-status
              method: GET
              description: "Check application package installation status"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: operationId
                  in: path
                  type: string
                  required: true
                  description: "Operation identifier"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-tenant-application-packages
              method: GET
              description: "List installable application packages for the tenant"
              inputParameters:
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: flow-runs
          path: /powerautomate
          description: "Power Automate flow run monitoring"
          operations:
            - name: list-flow-runs
              method: GET
              description: "List flow runs by workflow ID for an environment"
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "Environment identifier"
                - name: workflowId
                  in: query
                  type: string
                  required: true
                  description: "Workflow ID"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: licensing
          path: /licensing
          description: "Billing policy and licensing management"
          operations:
            - name: list-billing-policies
              method: GET
              description: "List billing policies for the tenant"
              inputParameters:
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-billing-policy
              method: POST
              description: "Create a new billing policy"
              inputParameters:
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  billingInstrument: "{{tools.billingInstrument}}"
            - name: get-billing-policy
              method: GET
              description: "Get details for a specific billing policy"
              inputParameters:
                - name: billingPolicyId
                  in: path
                  type: string
                  required: true
                  description: "Billing policy identifier"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-billing-policy
              method: PATCH
              description: "Update an existing billing policy"
              inputParameters:
                - name: billingPolicyId
                  in: path
                  type: string
                  required: true
                  description: "Billing policy identifier"
                - name: api-version
                  in: query
                  type: string
                  required: true
                  description: "API version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

  exposes:
    - type: rest
      port: 8100
      namespace: power-platform-rest
      resources:
        - path: /v1/environments
          name: environments
          description: "Environment management"
          operations:
            - method: GET
              name: list-environments
              description: "List all environments"
              call: "power-platform-api.list-environments"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/environments/{environmentId}
          name: environment-detail
          description: "Single environment operations"
          operations:
            - method: GET
              name: get-environment
              description: "Get environment details"
              call: "power-platform-api.get-environment"
              with:
                environmentId: "rest.environmentId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: power-platform-mcp
      transport: http
      tools:
        - name: list-environments
          description: "List all Power Platform environments"
          hints:
            readOnly: true
            openWorld: true
          call: "power-platform-api.list-environments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-environment
          description: "Get details for a specific environment"
          hints:
            readOnly: true
            idempotent: true
          call: "power-platform-api.get-environment"
          with:
            environmentId: "tools.environmentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-environment
          description: "Delete a Power Platform environment"
          hints:
            destructive: true
            idempotent: true
          call: "power-platform-api.delete-environment"
          with:
            environmentId: "tools.environmentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-application-packages
          description: "List application packages available in an environment"
          hints:
            readOnly: true
          call: "power-platform-api.get-environment-application-packages"
          with:
            environmentId: "tools.environmentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: install-application-package
          description: "Install an application package in an environment"
          hints:
            readOnly: false
          call: "power-platform-api.install-application-package"
          with:
            environmentId: "tools.environmentId"
            applicationPackageId: "tools.applicationPackageId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-install-status
          description: "Check application package installation status"
          hints:
            readOnly: true
          call: "power-platform-api.get-install-status"
          with:
            environmentId: "tools.environmentId"
            operationId: "tools.operationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tenant-packages
          description: "List installable packages for the tenant"
          hints:
            readOnly: true
          call: "power-platform-api.get-tenant-application-packages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-flow-runs
          description: "List flow runs by workflow ID"
          hints:
            readOnly: true
          call: "power-platform-api.list-flow-runs"
          with:
            environmentId: "tools.environmentId"
            workflowId: "tools.workflowId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-billing-policies
          description: "List billing policies for the tenant"
          hints:
            readOnly: true
          call: "power-platform-api.list-billing-policies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-billing-policy
          description: "Create a new billing policy"
          hints:
            readOnly: false
          call: "power-platform-api.create-billing-policy"
          with:
            name: "tools.name"
            billingInstrument: "tools.billingInstrument"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-billing-policy
          description: "Get billing policy details"
          hints:
            readOnly: true
          call: "power-platform-api.get-billing-policy"
          with:
            billingPolicyId: "tools.billingPolicyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-billing-policy
          description: "Update an existing billing policy"
          hints:
            readOnly: false
            idempotent: true
          call: "power-platform-api.update-billing-policy"
          with:
            billingPolicyId: "tools.billingPolicyId"
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
